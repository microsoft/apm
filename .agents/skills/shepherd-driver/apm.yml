name: shepherd-driver
version: 0.1.0
description: Composed drive-to-merge engine -- drives ONE selected pull request to mergeable under non-determinism via copilot-review classification, the apm-review-panel, fold-by-default, push-and-watch-CI. Used only by a parent batch orchestrator, never user-facing.
author: Microsoft
license: MIT
type: skill

# Composes the apm-review-panel skill as its per-PR review primitive.
#
# Belt + suspenders (genesis step 3.5 declaration mechanism = BOTH):
#  - Belt: the manifest dep below declares the edge so the resolver
#    deploys apm-review-panel alongside this driver. The local-path
#    key resolves relative to THIS package's directory (apm-usage
#    dependencies.md anchor rule), hence `../apm-review-panel`.
#  - Suspenders: the runtime activate-by-name probe in
#    `assets/shepherd-driver-prompt.md` loads apm-review-panel at
#    spawn time even if a consumer wired the deploy differently.
#
# The <= 0.14.1 orphaned-lockfile bug that forced batch-bug-shepherd
# to COMMENT OUT its analogous edge is fixed from 0.16 onward, so the
# real edge is declared here.
dependencies:
  apm:
    - ../apm-review-panel
  mcp: []
