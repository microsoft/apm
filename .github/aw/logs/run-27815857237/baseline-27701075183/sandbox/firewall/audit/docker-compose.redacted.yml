services:
  squid-proxy:
    container_name: awf-squid
    networks:
      awf-net:
        ipv4_address: 172.30.0.10
    volumes:
      - /tmp/gh-aw/sandbox/firewall/logs:/var/log/squid:rw
    healthcheck:
      test:
        - CMD
        - nc
        - '-z'
        - localhost
        - '3128'
      interval: 1s
      timeout: 1s
      retries: 5
      start_period: 2s
    ports:
      - '3128:3128'
    cap_drop:
      - NET_RAW
      - SYS_ADMIN
      - SYS_PTRACE
      - SYS_MODULE
      - MKNOD
      - AUDIT_WRITE
      - SETFCAP
    stop_grace_period: 2s
    user: '0:0'
    environment:
      AWF_SQUID_CONFIG_B64: '[REDACTED]'
    entrypoint:
      - /bin/bash
      - '-c'
      - chown proxy:proxy /var/log/squid 2>/dev/null || chmod 0777 /var/log/squid; if [ -d /var/spool/squid_ssl_db ]; then chown proxy:proxy /var/spool/squid_ssl_db 2>/dev/null || chmod 0777 /var/spool/squid_ssl_db; fi && exec su -s /bin/bash proxy -c 'echo "$$AWF_SQUID_CONFIG_B64" | base64 -d > /etc/squid/squid.conf && exec /usr/local/bin/entrypoint.sh'
    extra_hosts:
      - host.docker.internal:host-gateway
    image: ghcr.io/github/gh-aw-firewall/squid:0.25.55
  agent:
    container_name: awf-agent
    networks:
      awf-net:
        ipv4_address: 172.30.0.20
    dns:
      - 168.63.129.16
    dns_search: []
    volumes:
      - /tmp:/tmp:rw
      - /home/runner/work/apm/apm:/home/runner/work/apm/apm:rw
