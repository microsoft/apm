name: Verify shared/apm.md matrix secret-stripping fix

# Empirical proof for fixes in .github/workflows/shared/apm.md.
#
# Three job sets:
#
#   A. prove-old-pattern-strips-output (regression sentinel)
#      Replicates the pre-fix shape (PEM embedded in a job output). Asserts
#      that GitHub Actions still drops the output via its secret-redaction
#      filter (HostContext.SecretMasker.MaskSecrets in actions/runner). If
#      this job ever fails, GH has loosened the rule and we should reassess
#      the fix.
#
#   B. prove-new-pattern-survives (positive proof of the fix)
#      Replicates the post-fix shape (secret-free matrix + env-relay creds).
#      Asserts: (1) the matrix output survives, (2) the dependent matrix job
#      fans out to the expected number of rows, (3) each row successfully
#      resolves ROW_APP_ID / ROW_PRIVATE_KEY via $GITHUB_ENV, and the PEM
#      round-trips intact (SHA-256 comparison; the SHA is not a substring
#      of the PEM and is therefore not masked).
#
#   C. apm-version-pinning (positive proof of the import-default fix)
#      Proves the apm-version import-schema default in shared/apm.md pins
#      every non-opting consumer to a bare-semver CLI release instead of
#      floating to 'latest'. Two independent checks:
#        (1) Artifact assertion (no deps): every compiled *.lock.yml that
#            calls microsoft/apm-action renders a pinned `apm-version:
#            <semver>` literal and carries NO raw
#            `apm-version: ${{ github.aw.import-inputs.apm-version }}`
#            token. The raw token (the bug shape from PR #1842) is empty
#            at runtime, so apm-action resolves '' || 'latest' and floats.
#        (2) Drift guard (source of truth): the schema default in
#            shared/apm.md MUST equal the apm-version input default
#            declared by the pinned microsoft/apm-action ref. Fetches the
#            action's action.yml at that exact ref and compares. Fails if
#            the mirror drifts (see the MAINTENANCE note in shared/apm.md).
#
#   D. pack-format-consumer-compat (cross-repo drift guard)
#      Proves the `apm pack --archive` default archive format (.zip) stays
#      inside the extension set the pinned microsoft/apm-action release
#      detects when it scans the build dir for a bundle. Source of truth:
#      src/apm_cli/commands/pack.py (the --archive-format Click default the
#      CLI exposes and apm-action invokes) vs apm-action src/bundler.ts at the
#      pinned ref (consumer detection); the bundle/packer.py dataclass default
#      is asserted consistent. Fails on the
#      'apm pack produced no bundle' outage shape -- the CLI default flipped
#      from .tar.gz to .zip while apm-action still filtered only .tar.gz, so
#      the GH-AW Compatibility job saw no bundle. Keep the CLI default in
#      apm-action's detected set, or bump the pinned apm-action ref in
#      lockstep.
#
# Self-contained: no real GitHub-App credentials required. The synthetic
# PEM below is registered at runtime via ::add-mask:: which feeds the same
# HostContext.SecretMasker that processes repo / org secrets.

on:
  pull_request:
    paths:
      - .github/workflows/shared/apm.md
      - .github/workflows/verify-shared-apm-matrix.yml
      - .github/workflows/*.lock.yml
      - src/apm_cli/bundle/packer.py
  push:
    branches:
      - main
    paths:
      - .github/workflows/shared/apm.md
      - .github/workflows/verify-shared-apm-matrix.yml
      - .github/workflows/*.lock.yml
      - src/apm_cli/bundle/packer.py
  workflow_dispatch:

permissions:
  contents: read

env:
  # Synthetic, non-functional PEM used in both job sets. Truncated key body
  # so it cannot accidentally be used to authenticate anywhere. Both job
  # sets register it via ::add-mask:: so the runner treats it as a secret.
  SYNTHETIC_PEM: |
    -----BEGIN RSA PRIVATE KEY-----
    MIIBOgIBAAJBAKj34GkxFhD90vcNLYLInFEX6Ppy1tPf9Cnzj4p4WGeKLs1Pt8Qu
    SYNTHETIC-TEST-KEY-DO-NOT-USE
    -----END RSA PRIVATE KEY-----

jobs:
  # =====================================================================
  # Job set A: regression sentinel.
  # =====================================================================
  a-bug-prep:
    name: A. Old pattern (broken) - prep
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.emit.outputs.matrix }}
    steps:
      - name: Register synthetic PEM as a job secret
        id: pem
        run: |
          set -euo pipefail
          # ::add-mask:: registers the value in this job's SecretMasker.
          # Any subsequent step output OR job output containing this
          # substring will be subject to the runner's masking / stripping.
          while IFS= read -r line; do
            if [ -n "$line" ]; then echo "::add-mask::$line"; fi
          done <<< "$SYNTHETIC_PEM"
          # Pass through as a step output (step outputs are NOT subject
          # to the cross-job redaction filter; only job outputs are).
          {
            echo "pem<<PEMEOF"
            printf '%s\n' "$SYNTHETIC_PEM"
            echo "PEMEOF"
          } >> "$GITHUB_OUTPUT"
      - name: Emit broken-shape matrix (PEM embedded in job output)
        id: emit
        env:
          PEM: ${{ steps.pem.outputs.pem }}
        run: |
          set -euo pipefail
          # This is exactly the shape the pre-fix shared/apm.md emitted:
          # a matrix JSON whose "private-key" value contains the PEM.
          matrix=$(jq -nc --arg pk "$PEM" '{group:[{id:"x","private-key":$pk}]}')
          {
            echo "matrix=$matrix"
          } >> "$GITHUB_OUTPUT"
          # Note: we never echo $matrix to logs (masking would obscure it
          # anyway). The downstream job will receive an empty string here.

  a-bug-consume:
    name: A. Old pattern (broken) - assert stripped
    runs-on: ubuntu-latest
    needs: [a-bug-prep]
    steps:
      - name: Assert matrix output was stripped by GH secret filter
        env:
          GOT: ${{ needs.a-bug-prep.outputs.matrix }}
        run: |
          set -euo pipefail
          # GitHub Actions runs every job output through
          #   if (!string.Equals(out.Value, SecretMasker.MaskSecrets(out.Value)))
          #     context.Warning("Skip output '<name>' since it may contain secret.");
          # When the warning fires, the output is replaced with the empty
          # string before downstream jobs see it. We assert that holds.
          if [ -n "$GOT" ]; then
            echo "::error::Expected matrix output to be empty (stripped by GH redaction filter)."
            echo "::error::Got non-empty value of length ${#GOT}. Either GH changed the behaviour, or the synthetic PEM was not masked."
            exit 1
          fi
          echo "[OK] matrix output is empty -- GH redaction filter still active."
          echo "[OK] this proves shared/apm.md's pre-fix shape would silently break consumers."

  # =====================================================================
  # Job set B: positive proof that the env-relay fix survives.
  # =====================================================================
  b-fix-prep:
    name: B. New pattern (fixed) - prep
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.emit.outputs.matrix }}
      expected_sha: ${{ steps.emit.outputs.expected_sha }}
    steps:
      - name: Register synthetic PEM as a job secret (proves output survives anyway)
        run: |
          set -euo pipefail
          # We mask the PEM in this job too, so the redaction filter is
          # primed. The point is: even with the PEM registered, our
          # secret-FREE matrix output must still survive end-of-job
          # masking because the JSON value does not contain the PEM
          # substring. This is the core property the fix relies on.
          while IFS= read -r line; do
            if [ -n "$line" ]; then echo "::add-mask::$line"; fi
          done <<< "$SYNTHETIC_PEM"
      - name: Emit secret-free matrix + non-secret expected_sha
        id: emit
        run: |
          set -euo pipefail
          # Two rows mirroring the production schema: one "legacy" group,
          # one "apps[]" group. No PEM, no app-id; only routing metadata.
          matrix=$(jq -nc '{group:[
            {id:"legacy",   kind:"legacy", index:0, "has-app":"true", owner:"", repositories:"", packages:[]},
            {id:"acme-app", kind:"apps",   index:0, "has-app":"true", owner:"acme", repositories:"", packages:[]}
          ]}')
          # SHA-256 of the PEM, computed AFTER stripping trailing newlines
          # so the legacy and apps[] rows in b-fix-consume can converge on
          # the same hash regardless of whether their resolution path went
          # through bash command substitution (which strips trailing \n)
          # or direct env-var read (which preserves them). A SHA is not a
          # substring of the PEM, so the masker leaves it alone.
          pem_trim="$SYNTHETIC_PEM"
          while [ "${pem_trim: -1}" = $'\n' ]; do pem_trim=${pem_trim%$'\n'}; done
          sha=$(printf '%s' "$pem_trim" | sha256sum | cut -d' ' -f1)
          {
            echo "matrix=$matrix"
            echo "expected_sha=$sha"
          } >> "$GITHUB_OUTPUT"
          echo "matrix rows: $(echo "$matrix" | jq '.group | length')"
          echo "expected_sha: $sha"

  b-fix-assert-shape:
    name: B. New pattern (fixed) - assert matrix survives
    runs-on: ubuntu-latest
    needs: [b-fix-prep]
    steps:
      - name: Assert matrix output non-empty and has expected rows
        env:
          GOT: ${{ needs.b-fix-prep.outputs.matrix }}
          GOT_SHA: ${{ needs.b-fix-prep.outputs.expected_sha }}
        run: |
          set -euo pipefail
          if [ -z "$GOT" ]; then
            echo "::error::matrix output is EMPTY -- the secret-free shape should NOT be stripped."
            echo "::error::Either the PEM substring leaked into the matrix JSON, or GH tightened the filter."
            exit 1
          fi
          count=$(printf '%s' "$GOT" | jq '.group | length')
          if [ "$count" != "2" ]; then
            echo "::error::expected 2 matrix rows, got $count"
            exit 1
          fi
          if [ -z "$GOT_SHA" ] || [ "${#GOT_SHA}" -ne 64 ]; then
            echo "::error::expected_sha output missing or wrong length: '$GOT_SHA'"
            exit 1
          fi
          echo "[OK] matrix output survived (length ${#GOT}, $count rows)."
          echo "[OK] expected_sha output survived ($GOT_SHA)."

  b-fix-consume:
    name: B. New pattern (fixed) - per-row env-relay
    runs-on: ubuntu-latest
    needs: [b-fix-prep]
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.b-fix-prep.outputs.matrix) }}
    steps:
      - name: Re-register synthetic PEM as a job secret for this matrix row
        run: |
          set -euo pipefail
          while IFS= read -r line; do
            if [ -n "$line" ]; then echo "::add-mask::$line"; fi
          done <<< "$SYNTHETIC_PEM"
      - name: Resolve credentials for this matrix row (env-relay)
        env:
          # In production shared/apm.md these are substituted by gh-aw at
          # compile time from ${{ github.aw.import-inputs.* }}, set on
          # the apm job's env: block. Here we set them at step level so
          # we can reference the workflow-level env.SYNTHETIC_PEM (env
          # context is allowed in step-level env but not job-level env).
          AW_APM_LEGACY_APP_ID: '12345'
          AW_APM_LEGACY_PRIVATE_KEY: ${{ env.SYNTHETIC_PEM }}
          ROW_KIND: ${{ matrix.group.kind }}
          ROW_INDEX: ${{ matrix.group.index }}
        run: |
          # SECURITY: mirrors the production shared/apm.md hardenings.
          # Never `set -x` or echo $pk; ::add-mask:: registers the whole PEM
          # as one substring and will not mask individual lines.
          set -euo pipefail
          case "$ROW_KIND" in
            legacy)
              app_id="$AW_APM_LEGACY_APP_ID"
              pk="$AW_APM_LEGACY_PRIVATE_KEY"
              ;;
            apps)
              # Build the apps[] JSON inline with the synthetic PEM at
              # the indexed slot; mirrors what jq -r ".[$i]" does over
              # the substituted AW_APM_APPS in production shared/apm.md.
              apps_json=$(jq -nc --arg pk "$AW_APM_LEGACY_PRIVATE_KEY" '[{"app-id":"99999","private-key":$pk}]')
              app_id=$(printf '%s' "$apps_json" | jq -r --argjson i "$ROW_INDEX" '.[$i]["app-id"] // ""')
              pk=$(printf '%s' "$apps_json" | jq -r --argjson i "$ROW_INDEX" '.[$i]["private-key"] // ""')
              ;;
            *)
              echo "::error::unexpected kind '$ROW_KIND'"
              exit 1
              ;;
          esac
          if [ -z "$app_id" ] || [ -z "$pk" ]; then
            echo "::error::failed to resolve credentials for row kind=$ROW_KIND index=$ROW_INDEX"
            exit 1
          fi
          # Normalise trailing newline so legacy (direct env) and apps
          # (jq + $(...) which strips trailing \n) produce byte-identical
          # ROW_PRIVATE_KEY values, removing the asymmetry at the source.
          pk="${pk%$'\n'}"
          echo "::add-mask::$pk"
          # Random heredoc delimiter per https://docs.github.com/en/actions/using-workflows/workflow-commands-for-github-actions#multiline-strings
          # which warns against fixed delimiters for arbitrary multi-line values.
          delim="APMPK_$(openssl rand -hex 16)"
          {
            echo "ROW_APP_ID=$app_id"
            printf 'ROW_PRIVATE_KEY<<%s\n' "$delim"
            printf '%s\n' "$pk"
            printf '%s\n' "$delim"
          } >> "$GITHUB_ENV"
      - name: Assert ROW_PRIVATE_KEY round-tripped intact
        env:
          EXPECTED_SHA: ${{ needs.b-fix-prep.outputs.expected_sha }}
          ROW_KIND: ${{ matrix.group.kind }}
        run: |
          set -euo pipefail
          if [ -z "${ROW_APP_ID:-}" ]; then
            echo "::error::ROW_APP_ID was not set by the resolver step"
            exit 1
          fi
          if [ -z "${ROW_PRIVATE_KEY:-}" ]; then
            echo "::error::ROW_PRIVATE_KEY was not set by the resolver step"
            exit 1
          fi
          # No normalisation needed here: the resolver now strips trailing
          # newlines uniformly before the heredoc, and the $GITHUB_ENV
          # heredoc parser strips exactly one trailing \n before the
          # delimiter (per FileCommandManager). Both paths converge on the
          # same byte sequence -- assert directly.
          got_sha=$(printf '%s' "$ROW_PRIVATE_KEY" | sha256sum | cut -d' ' -f1)
          if [ "$got_sha" != "$EXPECTED_SHA" ]; then
            echo "::error::ROW_PRIVATE_KEY SHA mismatch (got=$got_sha expected=$EXPECTED_SHA)"
            echo "::error::The env-relay corrupted the PEM body. Check newline/heredoc handling."
            exit 1
          fi
          echo "[OK] row kind=$ROW_KIND app_id=$ROW_APP_ID pk_sha=$got_sha matches expected."

  # =====================================================================
  # Job set C: apm-version pinning (import-default fix, PR #1842).
  # =====================================================================
  c-apm-version-pinning:
    name: C. apm-version default pins non-opting consumers
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compiled consumer locks pin apm-version (no float-to-latest)
        run: |
          set -euo pipefail
          # Non-opting consumers import shared/apm.md WITHOUT passing
          # apm-version. gh-aw substitutes the import-schema default at
          # compile time, so each apm-action step in the lock must carry a
          # bare-semver `apm-version: <x.y.z>` literal. The pre-fix bug left
          # the raw `apm-version: ${{ github.aw.import-inputs.apm-version }}`
          # token in the lock; that token is empty at runtime, so apm-action
          # resolves '' || 'latest' and floats every run to the newest CLI.
          mapfile -t locks < <(grep -rl 'uses: microsoft/apm-action@' .github/workflows/*.lock.yml || true)
          if [ "${#locks[@]}" -eq 0 ]; then
            echo "::error::no compiled *.lock.yml references microsoft/apm-action -- harness cannot prove the property"
            exit 1
          fi
          fail=0
          for lock in "${locks[@]}"; do
            # 1. The raw compile-time token must NOT survive into the lock.
            if grep -Eq '^[[:space:]]*apm-version:[[:space:]]*\$\{\{[[:space:]]*github\.aw\.import-inputs\.apm-version' "$lock"; then
              echo "::error file=$lock::raw github.aw.import-inputs.apm-version token leaked into lock -- non-opting consumer floats to 'latest'"
              fail=1
            fi
            # 2. Every apm-action step must carry a bare-semver apm-version pin.
            n_action=$(grep -cE '^[[:space:]]*uses:[[:space:]]+microsoft/apm-action@' "$lock" || true)
            n_pinned=$(grep -cE '^[[:space:]]*apm-version:[[:space:]]+[0-9]+\.[0-9]+\.[0-9]+([[:space:]]|$)' "$lock" || true)
            if [ "$n_pinned" -lt "$n_action" ]; then
              echo "::error file=$lock::$n_action apm-action step(s) but only $n_pinned pinned apm-version line(s) -- a step would float to 'latest'"
              fail=1
            else
              echo "[OK] $lock: $n_action apm-action step(s), $n_pinned pinned apm-version line(s)"
            fi
          done
          if [ "$fail" -ne 0 ]; then
            exit 1
          fi
          echo "[OK] all ${#locks[@]} consumer lock(s) pin apm-version -- no float-to-latest path."

      - name: Drift guard - schema default mirrors apm-action's pinned default
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          src=.github/workflows/shared/apm.md
          # Schema default declared by shared/apm.md (the value gh-aw
          # substitutes when a consumer omits apm-version). Anchored to the
          # 4-space input `default:` so the step-level usages do not match.
          schema_default=$(grep -A15 '^  apm-version:' "$src" \
            | grep -m1 '^    default:' | tr -d "\"' " | sed 's/.*default://')
          # The apm-action ref the Pack and Restore steps pin to.
          action_ref=$(grep -m1 -oE 'microsoft/apm-action@[A-Za-z0-9._-]+' "$src" | cut -d@ -f2)
          echo "shared/apm.md schema default = '$schema_default'  (apm-action ref: $action_ref)"
          if [ -z "$schema_default" ] || [ -z "$action_ref" ]; then
            echo "::error file=$src::could not extract schema default ('$schema_default') or apm-action ref ('$action_ref')"
            exit 1
          fi
          # Source of truth: apm-action's own apm-version input default at the
          # pinned ref. The schema default MUST mirror it (see MAINTENANCE note).
          action_default=$(gh api "repos/microsoft/apm-action/contents/action.yml?ref=${action_ref}" --jq '.content' \
            | base64 -d \
            | grep -A15 '^  apm-version:' | grep -m1 '^    default:' | tr -d "\"' " | sed 's/.*default://')
          echo "apm-action@${action_ref} apm-version default = '$action_default'"
          if [ -z "$action_default" ]; then
            echo "::error::could not extract apm-version default from microsoft/apm-action@${action_ref}"
            exit 1
          fi
          if [ "$schema_default" != "$action_default" ]; then
            echo "::error file=$src::apm-version schema default '$schema_default' != apm-action@${action_ref} default '$action_default' -- bump in lockstep with the action (see MAINTENANCE note)"
            exit 1
          fi
          echo "[OK] schema default '$schema_default' mirrors apm-action@${action_ref} -- no drift."

  # =====================================================================
  # Job set D: apm pack archive-format <-> apm-action consumer detection.
  # Outage shape: GH-AW Compatibility job 'apm pack produced no bundle'.
  # =====================================================================
  d-pack-format-consumer-compat:
    name: D. apm pack default archive format is detected by apm-action
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Producer default archive ext is in the pinned apm-action detected set
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # 'apm pack --archive' defaults to .zip. apm-action scans the build
          # dir for an archive bundle by filtering on a fixed extension set.
          # When the CLI default flipped from .tar.gz to .zip but apm-action
          # still filtered only '.tar.gz', the GH-AW Compatibility job failed
          # with 'apm pack produced no bundle'. This guard cross-references the
          # two repos so the producer default can never silently drift out of
          # the set the pinned apm-action release detects.

          # Producer side (source of truth in THIS repo): apm-action invokes
          # `apm pack --archive` WITHOUT --archive-format, so the user-facing
          # default that decides the emitted extension is the Click option
          # default in commands/pack.py -- NOT the internal dataclass default
          # in bundle/packer.py. Read the CLI surface, then assert the dataclass
          # default stays consistent so a future split is caught here too.
          pack_cli=src/apm_cli/commands/pack.py
          producer_fmt=$(grep -A8 '"--archive-format"' "$pack_cli" \
            | grep -m1 -E '^[[:space:]]*default="' | sed -E 's/.*default="([^"]+)".*/\1/')
          case "$producer_fmt" in
            zip)    producer_ext=".zip" ;;
            tar.gz) producer_ext=".tar.gz" ;;
            "")     echo "::error file=$pack_cli::could not read the --archive-format Click default"; exit 1 ;;
            *)      echo "::error file=$pack_cli::unrecognized --archive-format default '$producer_fmt'"; exit 1 ;;
          esac
          echo "producer: 'apm pack --archive' default format = '$producer_fmt' (ext '$producer_ext') [commands/pack.py]"

          # Consistency: the bundle/packer.py dataclass default must agree with
          # the CLI default. apm pack constructs the packer from the CLI option,
          # so a divergence here means the two could disagree under some code
          # path -- fail loudly rather than trust a single side.
          packer_fmt=$(grep -m1 -E '^[[:space:]]*archive_format: str = "' \
            src/apm_cli/bundle/packer.py | sed -E 's/.*= "([^"]+)".*/\1/')
          if [ -n "$packer_fmt" ] && [ "$packer_fmt" != "$producer_fmt" ]; then
            echo "::error file=src/apm_cli/bundle/packer.py::archive_format dataclass default '$packer_fmt' disagrees with the --archive-format CLI default '$producer_fmt' (commands/pack.py) -- reconcile the two before relying on the drift guard."
            exit 1
          fi
          echo "consistency: packer.py dataclass default '$packer_fmt' matches CLI default"

          # Consumer side (cross-repo): read apm-action's archive-detection
          # extension set from the ref shared/apm.md pins (the release CI runs).
          src=.github/workflows/shared/apm.md
          action_ref=$(grep -m1 -oE 'microsoft/apm-action@[A-Za-z0-9._-]+' "$src" | cut -d@ -f2)
          if [ -z "$action_ref" ]; then
            echo "::error file=$src::could not extract microsoft/apm-action ref"; exit 1
          fi
          bundler=$(gh api "repos/microsoft/apm-action/contents/src/bundler.ts?ref=${action_ref}" --jq '.content' | base64 -d)
          # Consumer contract anchor: the ARCHIVE_EXTENSIONS constant lists the
          # extensions apm-action's findBundleOrNull() accepts in archive mode
          # (e.g. const ARCHIVE_EXTENSIONS = ['.zip', '.tar.gz']). Older releases
          # inline the set as archives = entries.filter(e => e.endsWith('.x') ...);
          # fall back to that shape so the guard reads both.
          detected=$(printf '%s\n' "$bundler" \
            | grep -E 'ARCHIVE_EXTENSIONS[[:space:]]*=[[:space:]]*\[' \
            | grep -oE "'\.[A-Za-z.]+'" | tr -d "'" | sort -u)
          if [ -z "$detected" ]; then
            detected=$(printf '%s\n' "$bundler" \
              | grep -E 'archives[[:space:]]*=[[:space:]]*entries\.filter' \
              | grep -oE "endsWith\('\.[A-Za-z.]+'\)" \
              | grep -oE "'\.[A-Za-z.]+'" | tr -d "'" | sort -u)
          fi
          if [ -z "$detected" ]; then
            echo "::error::could not read apm-action's archive-mode extension set (ARCHIVE_EXTENSIONS constant or archives = entries.filter ... endsWith) from microsoft/apm-action@${action_ref} src/bundler.ts -- the consumer contract may have moved; update this guard"
            exit 1
          fi
          echo "consumer: apm-action@${action_ref} detects archive extensions:"
          printf '  %s\n' $detected

          if printf '%s\n' "$detected" | grep -Fxq "$producer_ext"; then
            echo "[OK] apm pack default '$producer_ext' is in apm-action@${action_ref}'s detected set -- no producer/consumer drift."
          else
            echo "::error file=src/apm_cli/bundle/packer.py::apm pack default archive ext '$producer_ext' is NOT detected by microsoft/apm-action@${action_ref} (detects: $(echo $detected | tr '\n' ' '))"
            echo "::error::This is the 'apm pack produced no bundle' outage shape. Keep the CLI default in apm-action's detected set, or bump the pinned apm-action ref in $src to a release that detects '$producer_ext'."
            exit 1
          fi
