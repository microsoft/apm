# docs-index.yml -- corpus map for the docs-sync skill
#
# This file is the LOAD-BEARING ARTIFACT for the docs-sync agentic
# system. It records per-page metadata (title, persona, promise,
# documented symbols) and per-chapter abstracts (bridges, target
# persona). The docs-sync classifier consults this file (NOT the
# corpus itself) to bound its context envelope.
#
# Drift policy:
# - This file is committed alongside the docs corpus.
# - When the docs-sync skill emits a STRUCTURAL verdict (new page or
#   TOC reshape), it regenerates affected entries here as part of the
#   companion docs PR.
# - When the corpus changes through normal doc-writer work (Wave A-K
#   rewrite, ad-hoc edits), the editorial-owner is responsible for
#   refreshing affected entries in the same commit.
# - Stale entries are detectable via `apm docs-index lint` (TODO --
#   not yet implemented; for now, manual verification during shadow
#   phase).
#
# Bootstrap status: SEED entries below cover the high-traffic
# surface (consumer install, producer pack, enterprise audit). The
# full 100-page corpus index is rebuilt by the first structural
# verdict the skill emits.

version: 1

# 3-promise narrative anchors. Every page belongs to exactly one.
promises:
  - id: 1
    slug: consume
    label: "Consume primitives"
    persona: consumer
    description: >-
      Bring agent primitives (skills, agents, instructions, prompts)
      into your project via apm install.
  - id: 2
    slug: produce
    label: "Produce primitives"
    persona: producer
    description: >-
      Author, compile, pack, and publish primitives to a marketplace.
  - id: 3
    slug: govern
    label: "Govern primitives"
    persona: enterprise
    description: >-
      Audit, policy-enforce, registry-proxy, drift-detect at team
      and org scale.

# Chapter-level abstracts. CDO reads these to weigh bridges.
chapters:
  - slug: consumer
    abstract: >-
      The consumer ramp. Reader has primitives they want to use; they
      install, configure targets, run, iterate. Bridges to producer
      when reader decides to author their own.
    bridges_to: [producer]
    target_persona: consumer
    promise: 1

  - slug: producer
    abstract: >-
      The producer ramp. Reader has authored something locally and
      wants to ship it. Compile, pack, validate, publish. Bridges
      back to consumer (install your own) and forward to enterprise
      (govern what you ship).
    bridges_to: [consumer, enterprise]
    target_persona: producer
    promise: 2

  - slug: producer/author-primitives
    abstract: >-
      Author-side reference for each primitive type (skills, agents,
      instructions, prompts, hooks, commands, MCP). Sits inside
      producer ramp.
    bridges_to: [producer]
    target_persona: producer
    promise: 2

  - slug: enterprise
    abstract: >-
      The governance ramp. Reader represents a team or org. Audit,
      policy, registry proxy, drift detection, adoption playbook.
      Bridges back to producer (what producers must comply with).
    bridges_to: [producer]
    target_persona: enterprise
    promise: 3

  - slug: integrations
    abstract: >-
      How APM fits into existing tools (CI/CD, GitHub Rulesets,
      runtimes). Cross-cuts all three personas.
    bridges_to: [consumer, producer, enterprise]
    target_persona: cross
    promise: cross

  - slug: troubleshooting
    abstract: >-
      Symptom-first lookup pages. Cross-cuts all three personas;
      readers arrive here from search engines.
    bridges_to: [consumer, producer, enterprise]
    target_persona: cross
    promise: cross

  - slug: reference
    abstract: >-
      Canonical reference for commands, package types, schemas.
      Cross-cuts all personas; readers arrive here for exact answers.
    bridges_to: [consumer, producer, enterprise]
    target_persona: cross
    promise: cross

  - slug: contributing
    abstract: >-
      How to contribute to APM itself. Out-of-band from the 3-promise
      narrative; addresses contributors not users.
    bridges_to: []
    target_persona: contributor
    promise: meta

# Per-page entries. SEED set covers high-traffic pages. The full
# corpus index is generated by the first structural verdict.
pages:
  - path: docs/src/content/docs/consumer/index.md
    title: "Consumer overview"
    persona: consumer
    promise: 1
    documents_symbols:
      cli: []
      flags: []

  - path: docs/src/content/docs/consumer/install.md
    title: "Install primitives"
    persona: consumer
    promise: 1
    documents_symbols:
      cli: [apm install]
      flags: [--target, --lockfile-only, --no-cache, --force]
      schemas: [apm.yml.dependencies, apm.lock.yaml]

  - path: docs/src/content/docs/producer/index.md
    title: "Producer overview"
    persona: producer
    promise: 2
    documents_symbols:
      cli: []

  - path: docs/src/content/docs/producer/compile.md
    title: "Compile primitives"
    persona: producer
    promise: 2
    documents_symbols:
      cli: [apm compile]
      flags: [--target, --watch, --out]

  - path: docs/src/content/docs/producer/pack-a-bundle.md
    title: "Pack a bundle"
    persona: producer
    promise: 2
    documents_symbols:
      cli: [apm pack]
      flags: [--format, --out]

  - path: docs/src/content/docs/producer/publish-to-a-marketplace.md
    title: "Publish to a marketplace"
    persona: producer
    promise: 2
    documents_symbols:
      cli: [apm publish]

  - path: docs/src/content/docs/producer/author-primitives/skills.md
    title: "Author skills"
    persona: producer
    promise: 2
    documents_symbols:
      schemas: [SKILL.md frontmatter]

  - path: docs/src/content/docs/producer/author-primitives/instructions-and-agents.md
    title: "Author instructions and agents"
    persona: producer
    promise: 2
    documents_symbols:
      schemas: [.agent.md frontmatter, .instructions.md frontmatter]

  - path: docs/src/content/docs/enterprise/index.md
    title: "Enterprise overview"
    persona: enterprise
    promise: 3
    documents_symbols:
      cli: []

  - path: docs/src/content/docs/enterprise/apm-policy.md
    title: "APM policy"
    persona: enterprise
    promise: 3
    documents_symbols:
      cli: [apm audit]
      schemas: [apm-policy.yml]

  - path: docs/src/content/docs/enterprise/security.md
    title: "Security model"
    persona: enterprise
    promise: 3
    documents_symbols:
      cli: [apm audit]
      flags: [--strip, --file, --sarif, --json]

# Symbol-to-page reverse index. The localizer skill consults this
# to translate a diff symbol (e.g. a new flag) into a page list.
# Bootstrap: derived from the pages[] above. Regenerated on every
# structural verdict.
symbol_index:
  cli:
    "apm install": [docs/src/content/docs/consumer/install.md]
    "apm compile": [docs/src/content/docs/producer/compile.md]
    "apm pack": [docs/src/content/docs/producer/pack-a-bundle.md]
    "apm publish": [docs/src/content/docs/producer/publish-to-a-marketplace.md]
    "apm audit": [docs/src/content/docs/enterprise/apm-policy.md, docs/src/content/docs/enterprise/security.md]
  schemas:
    "apm.yml": [docs/src/content/docs/consumer/install.md]
    "apm.lock.yaml": [docs/src/content/docs/consumer/install.md]
    "apm-policy.yml": [docs/src/content/docs/enterprise/apm-policy.md]
    "SKILL.md": [docs/src/content/docs/producer/author-primitives/skills.md]
    ".agent.md": [docs/src/content/docs/producer/author-primitives/instructions-and-agents.md]

# Path patterns used by the L0 deterministic gate. Any PR that
# touches ONLY these paths short-circuits to no-change.
no_impact_paths:
  - "tests/**"
  - ".github/workflows/**"
  - ".github/instructions/**"
  - "docs/**"        # doc-only PRs need narrative review, not docs-sync
  - ".apm/**"        # primitive changes don't directly touch user docs
  - "scripts/**"
  - "*.md"           # root-level meta docs (CHANGELOG, CONTRIBUTING)
  - "pyproject.toml"
  - "uv.lock"

# Secondary doc surface: changes here are NOT the human-facing corpus
# (`docs/src/content/docs/**`) but ARE downstream documentation that
# may need a follow-up. The classifier should NOTE these in
# `reasoning` but NOT include them in `scope_pages[]` -- they have
# their own review path (apm-guide maintainers).
also_consider_paths:
  - "packages/apm-guide/.apm/skills/apm-usage/**"
  - "README.md"
  - "MANIFESTO.md"

# Path patterns that indicate USER-OBSERVABLE surface change. Any
# PR touching these survives the L0 gate and proceeds to L1 symbol
# extraction.
user_surface_paths:
  - "src/apm_cli/cli.py"
  - "src/apm_cli/commands/**"
  - "src/apm_cli/core/policy/**"
  - "src/apm_cli/models/apm_package.py"
  - "src/apm_cli/models/apm_lock.py"
  - "src/apm_cli/install/**"
  - "src/apm_cli/integration/**"
  - "src/apm_cli/utils/console.py"
