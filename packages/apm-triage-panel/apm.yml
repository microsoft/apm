name: apm-triage-panel
version: 0.1.0
description: Multi-persona triage panel for a single issue -- fans out to specialist persona lenses + a CEO arbiter, emits one synthesized triage decision (label set, milestone, next action).
author: Microsoft
license: MIT
type: skill

# Stand-alone primitive: no transitive APM deps. Persona lenses are
# referenced by relative path (../../agents/*.agent.md) and resolved
# against the consumer repo's installed .apm/agents/** or
# .github/agents/** -- identical to the apm-review-panel precedent.
dependencies:
  apm: []
  mcp: []
